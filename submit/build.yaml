AWSTemplateFormatVersion: '2010-09-09'
Description: DS5220 Data Project 1 - Anomaly Detection Pipeline

Parameters:
  MyIP:
    Type: String
    Default: 199.111.224.31/32
    Description: Your public IP in CIDR format for SSH

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: ds5220
    Description: Existing EC2 key pair for SSH

  RepoUrl:
    Type: String
    Default: https://github.com/s-aridi/anomaly-detection
    Description: URL of your forked anomaly-detection repo

  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-09c114d2b8b720c9f
    Description: VPC where the EC2 instance will run

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-05b3b22aa77d3692e
    Description: Public subnet for the EC2 instance

Resources:
  AppTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ds5220-dp1

  AppTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref AppTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3Publish
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref AppTopic
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  AppBucket:
    Type: AWS::S3::Bucket
    DependsOn: AppTopicPolicy
    Properties:
      NotificationConfiguration:
        TopicConfigurations:
          - Event: s3:ObjectCreated:*
            Topic: !Ref AppTopic
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: raw/
                  - Name: suffix
                    Value: .csv

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole

  EC2BucketPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: AppBucketAccess
      Roles:
        - !Ref EC2Role
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !Sub arn:aws:s3:::${AppBucket}
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub arn:aws:s3:::${AppBucket}/*

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH from my IP and FastAPI from anywhere
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MyIP
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0

  AppInstance:
    Type: AWS::EC2::Instance
    DependsOn:
      - EC2BucketPolicy
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      ImageId: ami-0b6c6ebed2801a5cb
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 16
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          apt-get update -y
          apt-get install -y git python3 python3-pip python3-venv

          cd /opt
          if [ ! -d /opt/anomaly-detection ]; then
            git clone ${RepoUrl} /opt/anomaly-detection
          fi

          cd /opt/anomaly-detection
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          echo "BUCKET_NAME=${AppBucket}" > /etc/environment
          export BUCKET_NAME=${AppBucket}

          touch /opt/anomaly-detection/app.log
          chmod 666 /opt/anomaly-detection/app.log
          chown -R ubuntu:ubuntu /opt/anomaly-detection

          cat > /etc/systemd/system/anomaly-api.service <<EOF
          [Unit]
          Description=Anomaly Detection FastAPI Service
          After=network.target

          [Service]
          User=ubuntu
          WorkingDirectory=/opt/anomaly-detection
          Environment=BUCKET_NAME=${AppBucket}
          ExecStart=/opt/anomaly-detection/venv/bin/fastapi run app.py --host 0.0.0.0 --port 8000
          Restart=always

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl daemon-reload
          systemctl enable anomaly-api
          systemctl start anomaly-api

  AppEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  AppEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref AppInstance
      EIP: !Ref AppEIP

  AppSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AppTopic
      Protocol: http
      Endpoint: !Sub http://${AppEIP}:8000/notify

Outputs:
  BucketName:
    Description: S3 bucket used by the application
    Value: !Ref AppBucket

  InstanceId:
    Description: EC2 instance ID
    Value: !Ref AppInstance

  ElasticIP:
    Description: Elastic IP address of the EC2 instance
    Value: !Ref AppEIP

  ApiUrl:
    Description: Base URL of the FastAPI service
    Value: !Sub http://${AppEIP}:8000

  NotifyEndpoint:
    Description: SNS HTTP endpoint
    Value: !Sub http://${AppEIP}:8000/notify

  TopicArn:
    Description: SNS topic ARN
    Value: !Ref AppTopic
